spring:
  application:
    name: BukuBesarKami

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_batch_fetch_size: 20   # Mitigasi N+1 query

  flyway:
    enabled: true
    locations: classpath:db/migration

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  # Spring Cache
  cache:
    type: redis
    redis:
      time-to-live: 3600000   # 1 jam default TTL

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

app:
  jwt:
    secret: ${JWT_SECRET:MySecretKeyForBukuBesarKamiShouldBeAtLeast256BitsLong!}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:86400000}

  # Rate Limiter: login endpoint
  rate-limit:
    login:
      capacity: 5            # max 5 request
      refill-tokens: 5       # isi ulang 5 token
      refill-seconds: 60     # setiap 60 detik (per IP)

  # Idempotency key TTL di Redis
  idempotency:
    ttl-hours: 24

  # Cache keys
  cache:
    coa-ttl-seconds: 3600    # COA cache 1 jam

# Actuator — HEALTHCHECK Docker
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    redis:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.bukubesarkami: INFO
    org.springframework.security: WARN
    org.springframework.cache: DEBUG